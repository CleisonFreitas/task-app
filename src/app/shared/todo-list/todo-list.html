<div class="bg-white rounded-2xl shadow-md p-6 flex flex-col gap-4">

  <h2 class="text-xl font-semibold text-gray-800">
    Suas tarefas
  </h2>

  <div *ngFor="let task of tasks"
       class="flex justify-between items-center bg-slate-100 p-4 rounded-xl">

    <div class="flex flex-col">
      <span class="font-medium text-gray-800">
        {{ task.titulo }}
      </span>

      <span class="text-sm text-gray-500">
        {{ task.descricao }}
      </span>

      <span
        class="text-xs mt-1"
        [ngClass]="task.concluida ? 'text-green-500' : 'text-yellow-500'">
        {{ task.concluida ? 'Concluído' : 'Pendente' }}
      </span>
    </div>

    <button
      (click)="onView(task)"
      class="text-sm px-3 py-1 rounded-lg border border-red-400 text-red-400
             hover:bg-red-400 hover:text-white transition-all duration-300">
      Detalhes
    </button>

  </div>

</div>
