<div class="flex flex-col gap-2 w-full">
    <label [for]="id" class="text-red-400 text-lg">
        {{ label }}
    </label>

    <div class="relative w-full">

        <span *ngIf="icon" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <ng-icon [name]="icon"></ng-icon>
        </span>

        <input [type]="inputType" [id]="id" [placeholder]="placeholder" [class.pl-10]="icon" class="w-full outline-none bg-gray-50 border border-white 
             rounded-lg focus:bg-white focus:border-red-400 text-red-400 p-3 pr-10" />

        <button *ngIf="type === 'password'" type="button" (click)="togglePasswordVisibility()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
            <ng-icon [name]="isPasswordVisible ? 'faEyeSlash' : 'faEye'"></ng-icon>
        </button>

    </div>
</div>
