<div class="flex flex-col gap-2 w-full">

  <label [for]="id" class="text-red-400 text-lg">
    {{ label }}
  </label>

  <div class="relative w-full">

    <span *ngIf="icon"
      class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
      <ng-icon [name]="icon"></ng-icon>
    </span>

    <input
      [type]="inputType"
      [id]="id"
      [placeholder]="placeholder"
      [class.pl-10]="icon"
      [value]="value"
      (input)="handleInput($event)"
      (blur)="onTouched()"
      [ngClass]="{
        'border-red-500 bg-white': error,
        'border-white bg-gray-50': !error
      }"
      class="w-full outline-none border rounded-lg
             focus:border-red-400 focus:bg-white text-gray-500 p-3 pr-10" />

    <button *ngIf="type === 'password'"
      type="button"
      (click)="togglePasswordVisibility()"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500">
      <ng-icon [name]="isPasswordVisible ? 'faEyeSlash' : 'faEye'"></ng-icon>
    </button>

  </div>

  <span *ngIf="error"
        class="text-sm text-red-500">
    {{ error }}
  </span>

</div>
