<div class="bg-white rounded-2xl shadow-md p-6">

  <h2 class="text-xl font-semibold text-gray-800 mb-4">
    Nova tarefa
  </h2>

  <form (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

    <app-custom-input [(ngModel)]="titulo" name="titulo" id="titulo" label="Título" placeholder="Digite o título"
      [error]="errors['titulo']">
    </app-custom-input>

    <app-custom-input [(ngModel)]="descricao" name="descricao" id="descricao" label="Descrição"
      placeholder="Digite a descrição" [error]="errors['descricao']">
    </app-custom-input>

    <label class="flex items-center gap-2 text-sm text-gray-600">
      <input type="checkbox" [(ngModel)]="concluida" name="concluida" />
      Concluído
    </label>

    <button type="submit" class="bg-red-400 text-white py-2 rounded-lg transition-all duration-300
           hover:bg-white hover:text-red-400 hover:border hover:border-red-400
           active:scale-[0.98] cursor-pointer">
      Salvar
    </button>
  </form>
</div>
