<section class="min-h-screen flex items-center justify-center bg-linear-to-br from-slate-100 to-red-50 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl shadow-red-100 p-8 flex flex-col gap-6">

    <div class="text-center space-y-2">
      <h1 class="text-2xl font-semibold text-gray-800">
        Criar Conta
      </h1>
      <p class="text-sm text-gray-500">
        Comece a organizar suas tarefas
      </p>
    </div>

    <form #form="ngForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

      <app-custom-input id="nome" label="Nome" type="text" placeholder="Digite seu nome" icon="faUser" [(ngModel)]="nome"
        name="nome">
      </app-custom-input>
      <p *ngIf="fieldErrors['nome']" class="text-red-500 text-xs mt-1">
        {{ fieldErrors['nome'] }}
      </p>

      <app-custom-input label="Email" type="text" placeholder="Digite seu email" icon="faUser" [(ngModel)]="email"
        name="email">
      </app-custom-input>
      <p *ngIf="fieldErrors['email']" class="text-red-500 text-xs mt-1">
        {{ fieldErrors['email'] }}
      </p>
      <app-custom-input label="Senha" type="password" placeholder="**********" icon="faSolidKey" [(ngModel)]="senha"
        name="senha">
      </app-custom-input>
      <p *ngIf="fieldErrors['senha']" class="text-red-500 text-xs mt-1">
        {{ fieldErrors['senha'] }}
      </p>

      <button
        type="submit"
        [disabled]="loading || form.invalid"
        class="w-full bg-red-400 text-white py-3 rounded-xl font-medium
               transition-all duration-300
               hover:bg-white hover:text-red-400 hover:border hover:border-red-400
               active:scale-[0.98] disabled:opacity-60 cursor-pointer">

        {{ loading ? 'Criando...' : 'Criar conta' }}

      </button>

    </form>

    <div *ngIf="generalError" class="bg-red-100 text-red-600 text-sm p-3 rounded-xl text-center">
      {{ generalError }}
    </div>

    <!-- Link Login -->
    <p class="text-center text-sm text-gray-500">
      Já possui conta?
      <a routerLink="/login" class="text-red-400 font-medium hover:underline cursor-pointer">
        Fazer login
      </a>
    </p>

  </div>
</section>
