<section class="p-6 max-w-3xl mx-auto flex flex-col gap-4">

  <app-todo-form (save)="addTask($event)"></app-todo-form>

  <div *ngIf="loading" class="text-center py-6 text-gray-500">
    Carregando tarefas...
  </div>

  <app-todo-list
    *ngIf="!loading"
    [tasks]="tasks">
  </app-todo-list>

</section>
